<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Новая ЗВС</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #0B0F19);
      color: var(--tg-theme-text-color, #fff);
      font-size: 16px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .header {
      padding: 28px 20px 20px;
      text-align: center;
      animation: fadeIn 0.4s ease-out;
    }
    .logo-row {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .logo {
      width: 56px;
      height: 56px;
      display: block;
    }
    .brand {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--tg-theme-text-color, #fff);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      color: var(--tg-theme-text-color, #fff);
    }
    .subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #94a3b8);
      margin-top: 4px;
    }

    /* CONTAINER */
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 8px 20px 120px;
    }

    /* FIELDS */
    .field {
      margin-bottom: 18px;
      animation: slideUp 0.35s ease-out backwards;
    }
    .field:nth-child(1) { animation-delay: 0.05s; }
    .field:nth-child(2) { animation-delay: 0.10s; }
    .field:nth-child(3) { animation-delay: 0.15s; }

    .label {
      display: block;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #94a3b8);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }

    .input, .textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      background: var(--tg-theme-secondary-bg-color, #151b2b);
      color: var(--tg-theme-text-color, #fff);
      font-size: 17px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
      font-weight: 500;
    }
    .input::placeholder, .textarea::placeholder {
      color: var(--tg-theme-hint-color, #475569);
      font-weight: 400;
    }
    .input:focus, .textarea:focus {
      border-color: #22C55E;
      background: var(--tg-theme-bg-color, #0f1525);
    }
    .textarea {
      resize: vertical;
      min-height: 88px;
      line-height: 1.4;
    }

    /* SUM */
    .amount-wrap {
      position: relative;
    }
    .amount-wrap .input {
      font-size: 28px;
      font-weight: 700;
      padding-right: 64px;
    }
    .amount-wrap .currency {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--tg-theme-hint-color, #94a3b8);
      font-size: 17px;
      font-weight: 600;
      pointer-events: none;
    }

    /* ACCOUNTS */
    .accounts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .account-btn {
      padding: 16px 8px;
      border: 1.5px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      background: var(--tg-theme-secondary-bg-color, #151b2b);
      color: var(--tg-theme-text-color, #fff);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      font-family: inherit;
    }
    .account-btn:active {
      transform: scale(0.97);
    }
    .account-btn.active {
      background: linear-gradient(135deg, #22C55E 0%, #16A34A 100%);
      color: #fff;
      border-color: #22C55E;
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.35);
    }

    /* PREVIEW */
    .preview {
      margin-top: 24px;
      padding: 18px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.08) 0%, rgba(34, 197, 94, 0.03) 100%);
      border-radius: 16px;
      border: 1px solid rgba(34, 197, 94, 0.2);
      animation: slideUp 0.3s ease-out;
    }
    .preview-title {
      font-size: 11px;
      color: var(--tg-theme-hint-color, #94a3b8);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .preview-amount {
      font-size: 32px;
      font-weight: 800;
      color: var(--tg-theme-text-color, #fff);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .preview-amount .unit {
      font-size: 18px;
      font-weight: 600;
      color: var(--tg-theme-hint-color, #94a3b8);
      margin-left: 4px;
    }
    .preview-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: rgba(148, 163, 184, 0.15);
      border-radius: 100px;
      font-size: 13px;
      color: var(--tg-theme-text-color, #cbd5e1);
      font-weight: 500;
    }
    .preview-purpose {
      font-size: 14px;
      color: var(--tg-theme-text-color, #cbd5e1);
      line-height: 1.4;
      word-break: break-word;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="22" fill="#22C55E"/>
        <g fill="#ffffff">
          <circle cx="50" cy="22" r="22"/>
          <circle cx="50" cy="78" r="22"/>
          <circle cx="22" cy="50" r="22"/>
          <circle cx="78" cy="50" r="22"/>
          <circle cx="50" cy="50" r="22"/>
        </g>
      </svg>
      <div class="brand">sales doctor</div>
    </div>
    <h1 class="title">Новая заявка</h1>
    <p class="subtitle">Запрос на выдачу средств</p>
  </div>

  <div class="container">
    <div class="field">
      <label class="label" for="amount">Сумма</label>
      <div class="amount-wrap">
        <input
          id="amount"
          class="input"
          type="number"
          inputmode="numeric"
          placeholder="0"
          min="1"
          max="100000000"
          autocomplete="off"
        >
        <span class="currency">тг</span>
      </div>
    </div>

    <div class="field">
      <label class="label" for="purpose">На что</label>
      <textarea
        id="purpose"
        class="textarea"
        placeholder="Например, ремонт принтера в офисе"
        maxlength="500"
      ></textarea>
    </div>

    <div class="field">
      <label class="label">С какого счёта</label>
      <div class="accounts">
        <button type="button" class="account-btn" data-value="халык">Халык</button>
        <button type="button" class="account-btn" data-value="каспи">Каспи</button>
        <button type="button" class="account-btn" data-value="Наличка">Наличка</button>
      </div>
    </div>

    <div class="preview" id="preview" style="display:none">
      <div class="preview-title">Заявка</div>
      <div class="preview-amount">
        <span id="prev-amount">0</span><span class="unit">тг</span>
      </div>
      <div class="preview-meta">
        <span class="chip" id="prev-account-chip" style="display:none"><span id="prev-account">—</span></span>
      </div>
      <div class="preview-purpose" id="prev-purpose">—</div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('bg_color');

    const amountEl = document.getElementById('amount');
    const purposeEl = document.getElementById('purpose');
    const accountBtns = document.querySelectorAll('.account-btn');
    const previewEl = document.getElementById('preview');
    const prevAmount = document.getElementById('prev-amount');
    const prevAccount = document.getElementById('prev-account');
    const prevAccountChip = document.getElementById('prev-account-chip');
    const prevPurpose = document.getElementById('prev-purpose');

    let selectedAccount = '';

    accountBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        accountBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAccount = btn.dataset.value;
        try { tg.HapticFeedback.selectionChanged(); } catch (e) {}
        updatePreview();
        updateMainButton();
      });
    });

    amountEl.addEventListener('input', () => { updatePreview(); updateMainButton(); });
    purposeEl.addEventListener('input', () => { updatePreview(); updateMainButton(); });

    function formatAmount(n) {
      return new Intl.NumberFormat('ru-RU').format(n);
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
    }

    function updatePreview() {
      const amount = parseInt(amountEl.value, 10);
      const purpose = purposeEl.value.trim();
      const account = selectedAccount;
      const hasAny = amount > 0 || purpose || account;
      previewEl.style.display = hasAny ? '' : 'none';
      prevAmount.textContent = amount > 0 ? formatAmount(amount) : '0';
      if (account) {
        prevAccount.textContent = capitalize(account);
        prevAccountChip.style.display = '';
      } else {
        prevAccountChip.style.display = 'none';
      }
      prevPurpose.textContent = purpose || '—';
    }

    function isValid() {
      const amount = parseInt(amountEl.value, 10);
      const purpose = purposeEl.value.trim();
      return amount > 0 && amount <= 100000000 && purpose.length >= 3 && selectedAccount !== '';
    }

    function updateMainButton() {
      if (isValid()) {
        tg.MainButton.setText('Отправить директору');
        tg.MainButton.enable();
        tg.MainButton.show();
      } else {
        tg.MainButton.setText('Заполни форму');
        tg.MainButton.disable();
        tg.MainButton.show();
      }
    }

    tg.MainButton.onClick(() => {
      if (!isValid()) return;
      try { tg.HapticFeedback.notificationOccurred('success'); } catch (e) {}
      const payload = {
        amount: parseInt(amountEl.value, 10),
        purpose: purposeEl.value.trim(),
        account: selectedAccount,
      };
      tg.sendData(JSON.stringify(payload));
      tg.close();
    });

    updateMainButton();
  </script>
</body>
</html>
